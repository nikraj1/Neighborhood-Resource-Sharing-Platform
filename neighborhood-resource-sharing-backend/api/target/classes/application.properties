spring.application.name=nearshare-api

# 1. Database Connection (Dynamic Environment Variables with Dev Fallbacks)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:nearshare;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=org.h2.Driver

# 2. Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# 3. Dynamic App Configurations for Production
app.backend.base-url=${APP_BACKEND_BASE_URL:http://localhost:8080}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:8081,https://share.nikhilraj.tech}